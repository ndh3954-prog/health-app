<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>나의 운동 기록</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FAF8F2;
    --paper: #FFFFFF;
    --ink: #1C2B24;
    --ink-soft: #5B6B62;
    --line: #E4E0D4;
    --accent: #2A4FD6;
    --accent-soft: #E7ECFB;
    --gold: #F2B705;
    --gold-soft: #FDF3D6;
    --danger: #D64545;
    --radius: 16px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ height:100%; }
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    overscroll-behavior:none;
    -webkit-font-smoothing:antialiased;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
    background:
      radial-gradient(circle at 100% 0%, rgba(42,79,214,0.06), transparent 40%),
      var(--bg);
  }

  /* ---------- Header ---------- */
  header{
    padding:22px 20px 14px;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
  }
  .brand{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:20px;
    letter-spacing:-0.02em;
  }
  .brand .dot{ color:var(--accent); }
  .subline{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:2px;
  }
  .streak-badge{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
  }
  .streak-label{
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:4px;
  }
  .odometer{
    display:flex;
    gap:2px;
    background:var(--ink);
    border-radius:8px;
    padding:5px 8px;
  }
  .odometer .digit{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:16px;
    color:#fff;
    width:11px;
    text-align:center;
  }
  .odometer .fire{ margin-left:4px; font-size:14px; }

  /* ---------- Tabs content ---------- */
  main{ flex:1; padding:0 20px 100px; }
  .screen{ display:none; animation:fadeIn .25s ease; }
  .screen.active{ display:block; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  /* ---------- Calendar ---------- */
  .cal-card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px 16px 20px;
  }
  .cal-nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .cal-nav button{
    background:none; border:none; cursor:pointer;
    width:32px; height:32px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    color:var(--ink);
  }
  .cal-nav button:active{ background:var(--line); }
  .cal-month{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:16px;
  }
  .cal-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:4px 0;
  }
  .cal-grid .wd{
    text-align:center;
    font-size:11px;
    color:var(--ink-soft);
    padding-bottom:8px;
    font-weight:500;
  }
  .cal-cell{
    position:relative;
    aspect-ratio:1;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .cal-cell .dnum{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
    z-index:2;
  }
  .cal-cell.empty{ visibility:hidden; }
  .cal-cell button.stamp{
    all:unset;
    width:78%;
    height:78%;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    position:relative;
  }
  .cal-cell button.stamp .dnum{ color:var(--ink-soft); }
  .cal-cell.today button.stamp{ box-shadow: inset 0 0 0 2px var(--accent); }
  .cal-cell.done button.stamp{
    background:var(--accent);
    box-shadow:0 3px 8px rgba(42,79,214,0.35);
  }
  .cal-cell.done .dnum{ color:#fff; font-weight:700; }
  .cal-cell.done.milestone button.stamp{ background:var(--gold); box-shadow:0 3px 10px rgba(242,183,5,0.45); }
  .cal-cell.done.milestone .dnum{ color:var(--ink); }
  .trail-dash{
    position:absolute;
    top:50%; left:100%;
    width:22%;
    height:2px;
    border-top:2px dashed var(--line);
    transform:translateY(-50%);
    z-index:1;
  }
  .cal-cell.chain-next .trail-dash{ border-top-color:#B9C6F5; }

  .legend{
    display:flex; gap:16px; margin-top:16px; padding-top:14px;
    border-top:1px solid var(--line);
    font-size:11px; color:var(--ink-soft);
  }
  .legend span{ display:flex; align-items:center; gap:6px; }
  .swatch{ width:10px; height:10px; border-radius:50%; display:inline-block; }

  /* ---------- Today card ---------- */
  .today-card{
    margin-top:16px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .today-card .label{ font-size:12px; color:var(--ink-soft); }
  .today-card .value{ font-family:'Space Grotesk'; font-weight:600; font-size:15px; margin-top:2px; }
  .today-card button{
    background:var(--ink);
    color:#fff;
    border:none;
    padding:10px 16px;
    border-radius:10px;
    font-family:'Inter';
    font-weight:600;
    font-size:13px;
    cursor:pointer;
  }

  /* ---------- Achievements ---------- */
  .sec-title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:20px;
    margin:20px 0 4px;
  }
  .sec-sub{ font-size:12px; color:var(--ink-soft); margin-bottom:16px; }

  .stat-row{ display:flex; gap:10px; margin-bottom:16px; }
  .stat-box{
    flex:1;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
  }
  .stat-box .num{ font-family:'JetBrains Mono'; font-weight:700; font-size:20px; }
  .stat-box .lab{ font-size:11px; color:var(--ink-soft); margin-top:4px; }

  .milestone-card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:14px;
  }
  .milestone-card .phrase{
    font-family:'Space Grotesk';
    font-weight:600;
    font-size:16px;
    margin-bottom:4px;
  }
  .milestone-card .range{ font-size:11px; color:var(--ink-soft); margin-bottom:12px; }
  .bar-track{
    height:8px;
    background:var(--line);
    border-radius:99px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    background:linear-gradient(90deg, var(--accent), var(--gold));
    border-radius:99px;
    transition:width .5s ease;
  }
  .milestone-list{ display:flex; flex-direction:column; gap:2px; }
  .milestone-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 4px;
    border-bottom:1px solid var(--line);
    font-size:13px;
  }
  .milestone-item:last-child{ border-bottom:none; }
  .milestone-item.reached .m-name{ color:var(--ink); font-weight:600; }
  .milestone-item .m-name{ color:var(--ink-soft); }
  .milestone-item .m-km{ font-family:'JetBrains Mono'; font-size:11px; color:var(--ink-soft); }
  .check{
    width:18px; height:18px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; flex-shrink:0; margin-right:8px;
    background:var(--line); color:transparent;
  }
  .milestone-item.reached .check{ background:var(--accent); color:#fff; }

  /* ---------- Settings ---------- */
  .settings-group{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:14px;
  }
  .settings-group .g-title{ font-size:12px; color:var(--ink-soft); margin-bottom:12px; text-transform:uppercase; letter-spacing:.06em; }
  .color-row{ display:flex; gap:12px; }
  .color-dot{
    width:38px; height:38px; border-radius:50%;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    border:3px solid transparent;
  }
  .color-dot.selected{ border-color:var(--ink); }
  .color-dot .ck{ color:#fff; font-size:14px; opacity:0; }
  .color-dot.selected .ck{ opacity:1; }
  .danger-btn{
    width:100%;
    background:none;
    border:1px solid var(--danger);
    color:var(--danger);
    padding:12px;
    border-radius:10px;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
  }
  .settings-note{ font-size:11px; color:var(--ink-soft); line-height:1.6; }

  /* ---------- Bottom nav ---------- */
  nav.tabbar{
    position:fixed;
    bottom:0; left:0; right:0;
    max-width:480px;
    margin:0 auto;
    background:rgba(250,248,242,0.92);
    backdrop-filter:blur(10px);
    border-top:1px solid var(--line);
    display:flex;
    padding:10px 10px calc(10px + var(--safe-bottom));
  }
  nav.tabbar button{
    flex:1;
    background:none;
    border:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    padding:6px 0;
    color:var(--ink-soft);
    cursor:pointer;
    font-family:'Inter';
    font-size:10px;
    font-weight:600;
  }
  nav.tabbar button.active{ color:var(--accent); }
  nav.tabbar svg{ width:22px; height:22px; }

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed; inset:0;
    background:rgba(28,43,36,0.45);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:50;
  }
  .overlay.open{ display:flex; }
  .sheet{
    background:var(--paper);
    width:100%;
    max-width:480px;
    border-radius:20px 20px 0 0;
    padding:22px 20px calc(22px + var(--safe-bottom));
    animation:slideUp .25s ease;
  }
  @keyframes slideUp{ from{ transform:translateY(30px); opacity:0; } to{ transform:translateY(0); opacity:1; } }
  .sheet-handle{ width:36px; height:4px; background:var(--line); border-radius:99px; margin:0 auto 16px; }
  .sheet h3{ font-family:'Space Grotesk'; margin:0 0 2px; font-size:17px; }
  .sheet .sheet-date{ font-size:12px; color:var(--ink-soft); margin-bottom:18px; }
  .field{ margin-bottom:14px; }
  .field label{ font-size:12px; color:var(--ink-soft); display:block; margin-bottom:6px; }
  .field input{
    width:100%;
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    font-family:'JetBrains Mono';
    font-size:15px;
    background:#FBFAF7;
  }
  .field input:focus{ outline:none; border-color:var(--accent); }
  .sheet-actions{ display:flex; gap:10px; margin-top:6px; }
  .sheet-actions button{
    flex:1;
    padding:13px;
    border-radius:10px;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    border:none;
  }
  .btn-cancel{ background:#F0EEE6; color:var(--ink); }
  .btn-save{ background:var(--accent); color:#fff; }
  .btn-delete{ background:none; color:var(--danger); border:1px solid var(--danger) !important; margin-top:8px; width:100%; }

  /* ---------- Praise toast + confetti ---------- */
  #confettiCanvas{
    position:fixed; inset:0;
    pointer-events:none;
    z-index:90;
  }
  .praise-toast{
    position:fixed;
    top:18%;
    left:50%;
    transform:translate(-50%,-10px);
    background:var(--ink);
    color:#fff;
    padding:16px 22px;
    border-radius:16px;
    font-family:'Space Grotesk';
    font-weight:600;
    font-size:15px;
    text-align:center;
    max-width:320px;
    z-index:95;
    opacity:0;
    transition:opacity .3s ease, transform .3s ease;
    box-shadow:0 12px 30px rgba(0,0,0,0.25);
  }
  .praise-toast.show{ opacity:1; transform:translate(-50%,0); }
  .praise-toast .sub{ font-family:'Inter'; font-weight:400; font-size:11px; color:#C9CFCB; margin-top:4px; }
</style>
</head>
<body>
<div id="app">

  <header>
    <div>
      <div class="brand">RUN<span class="dot">·</span>LOG</div>
      <div class="subline">나만의 운동 기록</div>
    </div>
    <div class="streak-badge">
      <div class="streak-label">연속 기록</div>
      <div class="odometer" id="odometer"></div>
    </div>
  </header>

  <main>
    <!-- CALENDAR SCREEN -->
    <section class="screen active" id="screen-cal">
      <div class="cal-card">
        <div class="cal-nav">
          <button id="prevMonth" aria-label="이전 달">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="cal-month" id="calMonthLabel"></div>
          <button id="nextMonth" aria-label="다음 달">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="legend">
          <span><span class="swatch" style="background:var(--accent)"></span>기록 완료</span>
          <span><span class="swatch" style="background:var(--gold)"></span>스트릭 달성일</span>
        </div>
      </div>

      <div class="today-card">
        <div>
          <div class="label" id="todayLabel">오늘</div>
          <div class="value" id="todayStatus">아직 기록 전이에요</div>
        </div>
        <button id="todayBtn">기록하기</button>
      </div>
    </section>

    <!-- ACHIEVEMENTS SCREEN -->
    <section class="screen" id="screen-ach">
      <div class="sec-title">성과</div>
      <div class="sec-sub">지금까지 쌓아온 기록이에요</div>

      <div class="stat-row">
        <div class="stat-box">
          <div class="num" id="statTotalKm">0<span style="font-size:12px">km</span></div>
          <div class="lab">누적 러닝 거리</div>
        </div>
        <div class="stat-box">
          <div class="num" id="statTotalDays">0<span style="font-size:12px">일</span></div>
          <div class="lab">총 운동 일수</div>
        </div>
        <div class="stat-box">
          <div class="num" id="statBestStreak">0<span style="font-size:12px">일</span></div>
          <div class="lab">최장 연속 기록</div>
        </div>
      </div>

      <div class="milestone-card">
        <div class="phrase" id="mPhrase">몸풀기부터 시작해봐요</div>
        <div class="range" id="mRange">0km / 5km</div>
        <div class="bar-track"><div class="bar-fill" id="mBarFill" style="width:0%"></div></div>
      </div>

      <div class="milestone-card">
        <div class="g-title" style="font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">전체 마일스톤</div>
        <div class="milestone-list" id="milestoneList"></div>
      </div>
    </section>

    <!-- SETTINGS SCREEN -->
    <section class="screen" id="screen-set">
      <div class="sec-title">설정</div>
      <div class="sec-sub">앱 표시 방식을 바꿀 수 있어요</div>

      <div class="settings-group">
        <div class="g-title">캘린더 완료 색상</div>
        <div class="color-row" id="colorRow"></div>
      </div>

      <div class="settings-group">
        <div class="g-title">데이터</div>
        <div class="settings-note" style="margin-bottom:12px;">모든 기록은 이 기기의 브라우저에만 저장돼요. 앱을 지우거나 브라우저 데이터를 초기화하면 기록도 함께 사라져요.</div>
        <button class="danger-btn" id="resetBtn">모든 기록 초기화</button>
      </div>
    </section>
  </main>

  <nav class="tabbar">
    <button class="tab-btn active" data-tab="cal">
      <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="3" stroke="currentColor" stroke-width="1.8"/><path d="M3 9.5H21" stroke="currentColor" stroke-width="1.8"/><path d="M8 3V6.5M16 3V6.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      캘린더
    </button>
    <button class="tab-btn" data-tab="ach">
      <svg viewBox="0 0 24 24" fill="none"><path d="M8 21H16M12 17V21M6 4H18V9C18 12.3137 15.3137 15 12 15C8.68629 15 6 12.3137 6 9V4Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M6 6H4C4 8 4.5 10 6 10.5M18 6H20C20 8 19.5 10 18 10.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      성과
    </button>
    <button class="tab-btn" data-tab="set">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      설정
    </button>
  </nav>
</div>

<!-- Entry modal -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3 id="sheetTitle">운동 기록</h3>
    <div class="sheet-date" id="sheetDate"></div>
    <div class="field">
      <label>운동 시간 (분)</label>
      <input type="number" inputmode="numeric" id="inputMinutes" placeholder="예: 40">
    </div>
    <div class="field">
      <label>러닝 거리 (km, 없으면 0)</label>
      <input type="number" inputmode="decimal" id="inputDistance" placeholder="예: 5.2">
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" id="btnCancel">취소</button>
      <button class="btn-save" id="btnSave">저장하기</button>
    </div>
    <button class="btn-delete" id="btnDelete" style="display:none;">이 날 기록 삭제</button>
  </div>
</div>

<canvas id="confettiCanvas"></canvas>
<div class="praise-toast" id="praiseToast">
  <div id="praiseMain">잘했어요!</div>
  <div class="sub" id="praiseSub"></div>
</div>

<script>
(function(){
  'use strict';

  /* ---------------- Storage ---------------- */
  var STORE_KEY = 'runlog_data_v1';
  var state = loadState();

  function loadState(){
    try{
      var raw = localStorage.getItem(STORE_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){}
    return { records:{}, themeColor:'#2A4FD6', bestStreak:0 };
  }
  function saveState(){
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
  }

  /* ---------------- Praise messages ---------------- */
  var PRAISE = [
    ["오늘도 해냈네요!","기록이 하나씩 쌓이고 있어요"],
    ["한계 극복!","멋진 하루를 만들었어요"],
    ["당신의 꾸준함에 박수를 보내요","👏"],
    ["조금씩 발전하는 모습이 보여요","오늘도 성장했어요"],
    ["오늘 흘린 땀은 배신하지 않아요","내일의 내가 고마워할 거예요"],
    ["기록 완료!","캘린더가 한 칸 더 채워졌어요"],
    ["잘 해내고 있어요","이 페이스 그대로 가봐요"],
    ["오늘의 나에게 박수를","작은 승리가 쌓이고 있어요"],
    ["멈추지 않는 게 진짜 실력이에요","오늘도 증명했네요"],
    ["대단해요!","꾸준함이 곧 실력이 됩니다"]
  ];
  var STREAK_PRAISE = {
    7:  ["7일 연속 달성!","일주일을 완주했어요 🔥"],
    15: ["15일 연속 달성!","이 정도면 습관이에요 🔥🔥"],
    30: ["30일 연속 달성!","완전히 삶의 일부가 됐어요 🔥🔥🔥"]
  };

  /* ---------------- Milestones ---------------- */
  var MILESTONES = [
    { km:5,    name:'몸풀기 완료' },
    { km:10,   name:'서울숲 여러 바퀴 거리' },
    { km:21.1, name:'하프마라톤 완주 거리' },
    { km:30,   name:'서울 → 의정부 거리' },
    { km:42.2, name:'풀마라톤 완주 거리' },
    { km:100,  name:'서울 → 평택 거리' },
    { km:200,  name:'서울 → 대전 왕복 거리' },
    { km:325,  name:'서울 → 부산 거리' },
    { km:650,  name:'서울 ↔ 부산 왕복 거리' }
  ];

  var COLORS = ['#2A4FD6','#1F9D6E','#D64545','#8B3FD6'];

  /* ---------------- Date helpers ---------------- */
  function pad(n){ return n<10 ? '0'+n : ''+n; }
  function dstr(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  function todayStr(){ return dstr(new Date()); }
  function parseDstr(s){ var p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }

  /* ---------------- View state ---------------- */
  var viewDate = new Date();
  var activeSheetDate = null;

  /* ---------------- Tab switching ---------------- */
  var tabs = document.querySelectorAll('.tab-btn');
  tabs.forEach(function(btn){
    btn.addEventListener('click', function(){
      tabs.forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
      document.getElementById('screen-'+btn.dataset.tab).classList.add('active');
      if(btn.dataset.tab === 'ach') renderAchievements();
    });
  });

  /* ---------------- Calendar rendering ---------------- */
  var monthLabelEl = document.getElementById('calMonthLabel');
  var gridEl = document.getElementById('calGrid');
  var WD = ['일','월','화','수','목','금','토'];

  function renderCalendar(){
    var y = viewDate.getFullYear(), m = viewDate.getMonth();
    monthLabelEl.textContent = y+'년 '+(m+1)+'월';
    gridEl.innerHTML = '';
    WD.forEach(function(w){
      var el = document.createElement('div');
      el.className = 'wd'; el.textContent = w;
      gridEl.appendChild(el);
    });
    var firstDay = new Date(y,m,1).getDay();
    var daysInMonth = new Date(y,m+1,0).getDate();
    var today = todayStr();

    for(var i=0;i<firstDay;i++){
      var empty = document.createElement('div');
      empty.className = 'cal-cell empty';
      gridEl.appendChild(empty);
    }
    for(var d=1; d<=daysInMonth; d++){
      var dateObj = new Date(y,m,d);
      var ds = dstr(dateObj);
      var rec = state.records[ds];
      var cell = document.createElement('div');
      cell.className = 'cal-cell';
      if(ds === today) cell.classList.add('today');
      if(rec){
        cell.classList.add('done');
        if(rec.milestoneDay) cell.classList.add('milestone');
      }
      var btn = document.createElement('button');
      btn.className = 'stamp';
      btn.innerHTML = '<span class="dnum">'+d+'</span>';
      btn.addEventListener('click', (function(dateCopy){
        return function(){ openSheet(dateCopy); };
      })(ds));
      cell.appendChild(btn);
      gridEl.appendChild(cell);
    }
    renderTodayCard();
    renderOdometer();
  }

  function renderTodayCard(){
    var today = todayStr();
    var rec = state.records[today];
    document.getElementById('todayLabel').textContent = fmtKorDate(new Date());
    var statusEl = document.getElementById('todayStatus');
    var btn = document.getElementById('todayBtn');
    if(rec){
      statusEl.textContent = rec.minutes+'분 · '+rec.distance+'km 기록 완료';
      btn.textContent = '기록 보기';
    } else {
      statusEl.textContent = '아직 기록 전이에요';
      btn.textContent = '기록하기';
    }
    btn.onclick = function(){ openSheet(today); };
  }

  function fmtKorDate(d){
    return (d.getMonth()+1)+'월 '+d.getDate()+'일';
  }

  /* ---------------- Streak logic ---------------- */
  function currentStreak(){
    var count = 0;
    var cursor = new Date();
    // if today has no record yet, streak counts up to yesterday
    if(!state.records[todayStr()]){
      cursor.setDate(cursor.getDate()-1);
    }
    while(true){
      var ds = dstr(cursor);
      if(state.records[ds]){
        count++;
        cursor.setDate(cursor.getDate()-1);
      } else break;
    }
    return count;
  }

  function renderOdometer(){
    var streak = currentStreak();
    var s = String(streak);
    if(s.length<2) s = '0'+s;
    var wrap = document.getElementById('odometer');
    wrap.innerHTML = '';
    s.split('').forEach(function(ch){
      var d = document.createElement('div');
      d.className = 'digit';
      d.textContent = ch;
      wrap.appendChild(d);
    });
    if(streak>=7){
      var fire = document.createElement('div');
      fire.className = 'fire';
      fire.textContent = '🔥';
      wrap.appendChild(fire);
    }
    if(streak > (state.bestStreak||0)){
      state.bestStreak = streak;
      saveState();
    }
  }

  /* ---------------- Achievements ---------------- */
  function totalKm(){
    var t = 0;
    Object.keys(state.records).forEach(function(k){
      t += (parseFloat(state.records[k].distance)||0);
    });
    return Math.round(t*10)/10;
  }
  function totalDays(){ return Object.keys(state.records).length; }

  function renderAchievements(){
    var km = totalKm();
    document.getElementById('statTotalKm').innerHTML = km+'<span style="font-size:12px">km</span>';
    document.getElementById('statTotalDays').innerHTML = totalDays()+'<span style="font-size:12px">일</span>';
    document.getElementById('statBestStreak').innerHTML = (state.bestStreak||0)+'<span style="font-size:12px">일</span>';

    // find current milestone bracket
    var prev = 0, next = MILESTONES[0];
    for(var i=0;i<MILESTONES.length;i++){
      if(km < MILESTONES[i].km){ next = MILESTONES[i]; prev = i>0?MILESTONES[i-1].km:0; break; }
      if(i === MILESTONES.length-1){ next = MILESTONES[i]; prev = MILESTONES[i].km; }
    }
    var pct = Math.min(100, Math.round(((km-prev)/(next.km-prev))*100));
    if(km >= MILESTONES[MILESTONES.length-1].km) pct = 100;
    document.getElementById('mPhrase').textContent = km <= 0 ? '기록을 시작해보세요' : next.name+(km>=next.km ? ' 달성!' : '까지 가는 중');
    document.getElementById('mRange').textContent = km+'km / '+next.km+'km';
    document.getElementById('mBarFill').style.width = pct+'%';

    var listEl = document.getElementById('milestoneList');
    listEl.innerHTML = '';
    MILESTONES.forEach(function(ms){
      var reached = km >= ms.km;
      var row = document.createElement('div');
      row.className = 'milestone-item'+(reached?' reached':'');
      row.innerHTML =
        '<div style="display:flex;align-items:center;">'+
          '<span class="check">'+(reached?'✓':'')+'</span>'+
          '<span class="m-name">'+ms.name+'</span>'+
        '</div>'+
        '<span class="m-km">'+ms.km+'km</span>';
      listEl.appendChild(row);
    });
  }

  /* ---------------- Sheet / entry modal ---------------- */
  var overlay = document.getElementById('overlay');
  var inputMinutes = document.getElementById('inputMinutes');
  var inputDistance = document.getElementById('inputDistance');
  var sheetDate = document.getElementById('sheetDate');
  var sheetTitle = document.getElementById('sheetTitle');
  var btnDelete = document.getElementById('btnDelete');

  function openSheet(ds){
    activeSheetDate = ds;
    var d = parseDstr(ds);
    sheetDate.textContent = d.getFullYear()+'년 '+fmtKorDate(d);
    var rec = state.records[ds];
    if(rec){
      sheetTitle.textContent = '기록 수정';
      inputMinutes.value = rec.minutes;
      inputDistance.value = rec.distance;
      btnDelete.style.display = 'block';
    } else {
      sheetTitle.textContent = '운동 기록';
      inputMinutes.value = '';
      inputDistance.value = '';
      btnDelete.style.display = 'none';
    }
    overlay.classList.add('open');
  }
  function closeSheet(){ overlay.classList.remove('open'); activeSheetDate = null; }

  document.getElementById('btnCancel').addEventListener('click', closeSheet);
  overlay.addEventListener('click', function(e){ if(e.target === overlay) closeSheet(); });

  document.getElementById('btnSave').addEventListener('click', function(){
    var minutes = parseFloat(inputMinutes.value);
    var distance = parseFloat(inputDistance.value);
    if(isNaN(minutes) || minutes <= 0){
      inputMinutes.focus();
      return;
    }
    if(isNaN(distance) || distance < 0) distance = 0;

    var wasAlreadyDone = !!state.records[activeSheetDate];
    var prevKm = totalKm();

    state.records[activeSheetDate] = { minutes:minutes, distance:distance, milestoneDay:false };
    var newKm = prevKm + distance - (wasAlreadyDone ? (state.records[activeSheetDate]._old||0) : 0);

    saveState();
    closeSheet();
    renderCalendar();

    if(!wasAlreadyDone){
      triggerCelebration(distance, prevKm);
    }
  });

  document.getElementById('btnDelete').addEventListener('click', function(){
    if(activeSheetDate) delete state.records[activeSheetDate];
    saveState();
    closeSheet();
    renderCalendar();
  });

  /* ---------------- Celebration: confetti + praise + streak check ---------------- */
  function triggerCelebration(distanceAdded, prevKm){
    var streak = currentStreak();
    var isMilestoneStreak = STREAK_PRAISE.hasOwnProperty(streak);

    if(isMilestoneStreak){
      var ds = todayStr();
      if(state.records[ds]) state.records[ds].milestoneDay = true;
      saveState();
      renderCalendar();
      launchConfetti(true);
      showPraise(STREAK_PRAISE[streak][0], STREAK_PRAISE[streak][1]);
    } else {
      launchConfetti(false);
      var msg = PRAISE[Math.floor(Math.random()*PRAISE.length)];
      showPraise(msg[0], msg[1]);
    }
  }

  var toast = document.getElementById('praiseToast');
  var toastTimer = null;
  function showPraise(main, sub){
    document.getElementById('praiseMain').textContent = main;
    document.getElementById('praiseSub').textContent = sub || '';
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toast.classList.remove('show'); }, 3200);
  }

  /* ---------------- Lightweight confetti (canvas, no deps) ---------------- */
  var canvas = document.getElementById('confettiCanvas');
  var ctx = canvas.getContext('2d');
  function resizeCanvas(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  var particles = [];
  var confettiRAF = null;

  function launchConfetti(big){
    var count = big ? 220 : 90;
    var colors = [state.themeColor, '#F2B705', '#1C2B24', '#D64545'];
    for(var i=0;i<count;i++){
      particles.push({
        x: Math.random()*canvas.width,
        y: -20 - Math.random()*canvas.height*0.3,
        w: 5 + Math.random()*5,
        h: 8 + Math.random()*6,
        color: colors[Math.floor(Math.random()*colors.length)],
        vy: 2 + Math.random()*(big?4:3),
        vx: -2 + Math.random()*4,
        rot: Math.random()*360,
        vr: -8 + Math.random()*16
      });
    }
    if(!confettiRAF) animateConfetti();
    setTimeout(function(){ /* natural fade via lifespan below */ }, 0);
  }

  var confettiStart = 0;
  function animateConfetti(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(function(p){
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    particles = particles.filter(function(p){ return p.y < canvas.height + 30; });
    if(particles.length > 0){
      confettiRAF = requestAnimationFrame(animateConfetti);
    } else {
      confettiRAF = null;
      ctx.clearRect(0,0,canvas.width,canvas.height);
    }
  }

  /* ---------------- Month nav ---------------- */
  document.getElementById('prevMonth').addEventListener('click', function(){
    viewDate.setMonth(viewDate.getMonth()-1);
    renderCalendar();
  });
  document.getElementById('nextMonth').addEventListener('click', function(){
    viewDate.setMonth(viewDate.getMonth()+1);
    renderCalendar();
  });

  /* ---------------- Settings ---------------- */
  var colorRow = document.getElementById('colorRow');
  function renderColorPicker(){
    colorRow.innerHTML = '';
    COLORS.forEach(function(c){
      var dot = document.createElement('div');
      dot.className = 'color-dot'+(state.themeColor===c?' selected':'');
      dot.style.background = c;
      dot.innerHTML = '<span class="ck">✓</span>';
      dot.addEventListener('click', function(){
        state.themeColor = c;
        document.documentElement.style.setProperty('--accent', c);
        saveState();
        renderColorPicker();
        renderCalendar();
      });
      colorRow.appendChild(dot);
    });
  }

  document.getElementById('resetBtn').addEventListener('click', function(){
    if(confirm('정말 모든 운동 기록을 삭제할까요? 이 작업은 되돌릴 수 없어요.')){
      state.records = {};
      state.bestStreak = 0;
      saveState();
      renderCalendar();
      renderAchievements();
    }
  });

  /* ---------------- Init ---------------- */
  document.documentElement.style.setProperty('--accent', state.themeColor || '#2A4FD6');
  renderColorPicker();
  renderCalendar();
})();
</script>
</body>
</html>
